services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hanomi
      POSTGRES_PASSWORD: hanomi_dev
      POSTGRES_DB: mtc_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanomi -d mtc_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hanomi:hanomi_dev@db:5432/mtc_pipeline
      CAD_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
